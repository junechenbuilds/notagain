name = "notagain-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

[durable_objects]
bindings = [
  { name = "THRON_COUNTER", class_name = "ThronCounter" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ThronCounter"]

# KV namespace IDs will be filled after running:
#   npx wrangler kv:namespace create SESSIONS
#   npx wrangler kv:namespace create CACHE
[[kv_namespaces]]
binding = "SESSIONS"
id = "d5c90c72e24f47d492ae59d716bd9a9b"

[[kv_namespaces]]
binding = "CACHE"
id = "c23248c768894554b5ee4bed3e3d8c95"

[triggers]
crons = ["*/5 * * * *"]

[vars]
ALLOWED_ORIGIN = "https://notagain.one"
